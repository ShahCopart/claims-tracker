<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#2563eb;--accent2:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#7c3aed;--teal:#0d9488}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px;width:380px}
.login-logo{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--accent)}
.login-sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.login-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{background:var(--accent2)}
.login-err{color:#f87171;font-size:12px;margin-top:8px}
.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-title{font-size:16px;font-weight:700;color:var(--accent)}
.user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2)}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto}
.nav::-webkit-scrollbar{height:3px}
.nav::-webkit-scrollbar-thumb{background:#333}
.ntab{padding:10px 14px;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.nbadge{background:var(--accent);color:white;border-radius:10px;padding:1px 5px;font-size:10px;margin-left:4px}
.main{flex:1;padding:16px 20px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:var(--red);color:white}
.btn-success{background:var(--green);color:white}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:11px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.search{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;width:220px}
.search:focus{outline:none;border-color:var(--accent)}
.fsel{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;cursor:pointer}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl-scroll{overflow-x:auto;max-height:calc(100vh - 210px);overflow-y:auto}
.tbl-scroll::-webkit-scrollbar{width:6px;height:6px}
.tbl-scroll::-webkit-scrollbar-track{background:var(--bg3)}
.tbl-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:500;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
tbody td{padding:8px 10px;border-bottom:1px solid #111;vertical-align:middle;white-space:nowrap}
tbody tr:hover td{background:#1a1a1a;cursor:pointer}
tbody tr:last-child td{border-bottom:none}
.flag{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px}
.detail-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;flex-direction:column}
.detail-screen.open{display:flex}
.detail-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.detail-vin{font-size:18px;font-weight:700;font-family:monospace}
.detail-body{padding:24px;max-width:1400px;margin:0 auto;width:100%}
.detail-footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:10}
.sec{margin-bottom:24px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.s2{grid-column:span 2}.fg.s3{grid-column:span 3}.fg.s4{grid-column:span 4}
.fl{font-size:11px;font-weight:500;color:var(--text2)}
.fi,.fsel2,.fta{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;width:100%}
.fi:focus,.fsel2:focus,.fta:focus{outline:none;border-color:var(--accent)}
.fta{resize:vertical;min-height:80px;font-family:inherit;line-height:1.6}
.fta-lg{min-height:200px}
.checklist{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:900px){.checklist{grid-template-columns:repeat(2,1fr)}}
.ci{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;transition:all 0.15s;font-size:12px}
.ci.on{background:#0f2a1a;border-color:#166534}
.ci input{width:15px;height:15px;accent-color:var(--green)}
.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:280px;overflow-y:auto}
.note-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.note-meta{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between}
.note-text{font-size:13px;line-height:1.5;white-space:pre-wrap}
.note-row{display:flex;gap:8px}
.note-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit}
.note-input:focus{outline:none;border-color:var(--accent)}
.exp-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.exp-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px}
.exp-total{text-align:right;font-size:13px;font-weight:600;color:var(--accent);padding:6px 0;border-top:1px solid var(--border)}
.stage-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px}
.dash-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.dash-grid{grid-template-columns:repeat(2,1fr)}}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.dc-num{font-size:28px;font-weight:700;margin:4px 0}
.dc-lbl{font-size:11px;color:var(--text2)}
.dc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bk-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.bk-hdr{background:var(--bg3);padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2)}
.bk-row{display:flex;justify-content:space-between;padding:6px 14px;border-bottom:1px solid #111;font-size:12px}
.bk-row:last-child{border-bottom:none}
.bk-cnt{font-weight:600;color:var(--accent)}
.hist-item{display:flex;gap:10px;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid #111}
.hist-stage{color:var(--text);font-weight:500;min-width:160px}
.hist-dur{color:var(--accent);min-width:80px}
.lease-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:13px;z-index:9999;animation:fIn 0.2s ease}
.tok-ok{border-color:var(--green);color:#86efac}
.tok-err{border-color:var(--red);color:#fca5a5}
@keyframes fIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;display:inline-block;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.sbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.s-repo{background:#3b1a1a;color:#fca5a5}
.s-intake{background:#1a2a3b;color:#93c5fd}
.s-manager{background:#2a1a3b;color:#c4b5fd}
.s-epika{background:#1a3b2a;color:#6ee7b7}
.s-shop{background:#3b2a1a;color:#fcd34d}
.s-insp{background:#1a3b3b;color:#67e8f9}
.s-ready{background:#1a3b1a;color:#86efac}
.s-leas{background:#2a3b1a;color:#bef264}
.s-hold{background:#3b3b1a;color:#fde68a}
.s-tl{background:#3b1a2a;color:#f9a8d4}
.s-closed{background:#2a2a2a;color:#9ca3af}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:400;display:flex;align-items:center;justify-content:center}
.overlay-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:92vw;max-width:960px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.ov-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:1}
.ov-body{padding:20px;flex:1}
.ov-ftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg2)}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">🚛 Fleet Tracker</div>
    <div class="login-sub">Copart Fleet Management System</div>
    <input type="text" id="ln" placeholder="Your full name">
    <input type="email" id="le" placeholder="Work email">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="app-title">🚛 Fleet Tracker</div>
      <div class="user-badge" id="ubadge"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="openNewTruck()">+ Add Truck</button>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="nav">
    <div class="ntab active" onclick="switchTab('dashboard',this)">Dashboard</div>
    <div class="ntab" onclick="switchTab('Repo',this)">Repo <span class="nbadge" id="c-Repo">0</span></div>
    <div class="ntab" onclick="switchTab('Intake',this)">Intake <span class="nbadge" id="c-Intake">0</span></div>
    <div class="ntab" onclick="switchTab('Manager Review',this)">Manager Review <span class="nbadge" id="c-Manager Review">0</span></div>
    <div class="ntab" onclick="switchTab('Epika',this)">Epika <span class="nbadge" id="c-Epika">0</span></div>
    <div class="ntab" onclick="switchTab('At Shop',this)">At Shop <span class="nbadge" id="c-At Shop">0</span></div>
    <div class="ntab" onclick="switchTab('Final Inspection',this)">Final Inspection <span class="nbadge" id="c-Final Inspection">0</span></div>
    <div class="ntab" onclick="switchTab('Ready to Assign',this)">Ready to Assign <span class="nbadge" id="c-Ready to Assign">0</span></div>
    <div class="ntab" onclick="switchTab('In Leasing',this)">In Leasing <span class="nbadge" id="c-In Leasing">0</span></div>
    <div class="ntab" onclick="switchTab('Hold 4 Cars',this)">Hold 4 Cars <span class="nbadge" id="c-Hold 4 Cars">0</span></div>
    <div class="ntab" onclick="switchTab('Total Loss',this)">Total Loss <span class="nbadge" id="c-Total Loss">0</span></div>
    <div class="ntab" onclick="switchTab('Reassignment Closed',this)">Reassignment Closed <span class="nbadge" id="c-Reassignment Closed">0</span></div>
    <div class="ntab" onclick="switchTab('claims',this)">Claims <span class="nbadge" id="c-claims">0</span></div>
    <div class="ntab" onclick="switchTab('report',this)">Reports</div>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="detail-screen" id="dscreen">
  <div class="detail-header">
    <div>
      <div class="detail-vin" id="d-vin">-</div>
      <div style="font-size:13px;color:var(--text2);margin-top:2px" id="d-ymm">-</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="d-sbadge" class="sbadge s-intake">-</span>
      <div id="d-flags"></div>
      <button class="btn btn-secondary btn-sm" onclick="closeDetail()">✕ Close</button>
    </div>
  </div>
  <div class="detail-body" id="dbody"></div>
  <div class="detail-footer">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="font-size:12px;color:var(--text2)">Move to:</label>
      <select class="stage-sel" id="d-move" onchange="moveStage()">
        <option value="">Select stage...</option>
        <option>Repo</option><option>Intake</option><option>Manager Review</option>
        <option>Epika</option><option>At Shop</option><option>Final Inspection</option>
        <option>Ready to Assign</option><option>In Leasing</option>
        <option>Hold 4 Cars</option><option>Total Loss</option><option>Reassignment Closed</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="emailTruck()">📧 Email</button>
      <button class="btn btn-danger btn-sm" onclick="delTruck()">🗑 Delete</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="closeDetail()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTruck()">💾 Save</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://grillezennazhgruvtav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyaWxsZXplbm5hemhncnV2dGF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzAxMzMsImV4cCI6MjA5NTIwNjEzM30.CVbSaQ04mI8L7RUF8KEFGqQKskumFVGyJczP1RjwKkE';
const db=supabase.createClient(SB_URL,SB_KEY);

let me=null, tab='dashboard', truckId=null;
let trucks=[], claims=[], notes=[], exps=[], hist=[];

const STAGES=['Repo','Intake','Manager Review','Epika','At Shop','Final Inspection','Ready to Assign','In Leasing','Hold 4 Cars','Total Loss','Reassignment Closed'];
const SHOP_ST=['Under Review','Dispatched to Shop','Arrived at Shop','Waiting for Estimate','Pending Approval','Approved - Work Requested','Work in Progress','Work Complete','Dispatched Back to Yard','Arrived - Needs Wash & Inspection','Transit Pros'];
const STATES=['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'];
const CLAIM_ST=['Open','In Progress','Pending','Under Review','Urgent Review','Approved','Denied','On Hold','Follow Up','Follow Up with GM','Follow Up with Maintenance','Following Up with Insurance','Follow Up on Documents','Follow Up with Leasing CO','Pending Total Loss','Pending Completion','Pending Check','Pending Rejection','Pending Estimate','Pending Pay Off','Pending Pictures','Pending Legal','Pending Complete','Shah Working On','Complete','Done'];
const SCSS={Repo:'s-repo',Intake:'s-intake','Manager Review':'s-manager',Epika:'s-epika','At Shop':'s-shop','Final Inspection':'s-insp','Ready to Assign':'s-ready','In Leasing':'s-leas','Hold 4 Cars':'s-hold','Total Loss':'s-tl','Reassignment Closed':'s-closed'};

async function doLogin(){
  const name=document.getElementById('ln').value.trim();
  const email=document.getElementById('le').value.trim().toLowerCase();
  if(!name||!email){document.getElementById('lerr').textContent='Enter name and email';return}
  let{data:u}=await db.from('users').select('*').eq('email',email).maybeSingle();
  if(!u){const r=await db.from('users').insert({name,email}).select().single();u=r.data}
  me=u||{name,email};
  localStorage.setItem('ft_user',JSON.stringify(me));
  bootApp();
}
function doLogout(){localStorage.removeItem('ft_user');me=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none'}
async function bootApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('ubadge').textContent='👤 '+me.name;
  document.getElementById('main').innerHTML='<div style="padding:40px;color:var(--text2);display:flex;align-items:center"><div class="spin"></div>Loading data...</div>';
  await loadData();
  doTab('dashboard',document.querySelector('.ntab'));
}
async function loadData(){
  const[{data:t},{data:c}]=await Promise.all([
    db.from('trucks').select('*').order('created_at',{ascending:false}),
    db.from('claims').select('*').order('created_at',{ascending:false})
  ]);
  trucks=t||[];claims=c||[];updateBadges();
}
function updateBadges(){
  STAGES.forEach(s=>{const el=document.getElementById('c-'+s);if(el)el.textContent=trucks.filter(t=>t.stage===s).length});
  const cl=document.getElementById('c-claims');
  if(cl)cl.textContent=claims.filter(c=>c.status!=='Done'&&c.status!=='Complete').length;
}
function doTab(key,el){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  tab=key;renderTab();
}
function switchTab(key,el){doTab(key,el)}
function renderTab(){
  const m=document.getElementById('main');
  if(STAGES.includes(tab))renderList(tab,m);
  else if(tab==='dashboard')renderDash(m);
  else if(tab==='claims')renderClaims(m);
  else if(tab==='report')renderReport(m);
}
function flags(t){
  let f='';
  if(t.title_issue)f+='<span class="flag" style="background:#ef4444" title="Title Issue"></span>';
  if(t.has_claim)f+='<span class="flag" style="background:#f59e0b" title="Has Claim"></span>';
  if(t.total_loss)f+='<span class="flag" style="background:#a78bfa" title="Total Loss"></span>';
  const hasTracker=t.tracker_gs||t.tracker_azuga||t.tracker_samsara;
  f+=`<span class="flag" style="background:${hasTracker?'#22c55e':'#6b7280'}" title="${hasTracker?'Tracker OK':'No Tracker'}"></span>`;
  return f;
}
function renderList(stage,m){
  const rows=trucks.filter(t=>(t.stage||'').trim()===stage.trim());
  m.innerHTML=`
  <div class="filters">
    <input class="search" id="srch" placeholder="Search VIN, yard..." oninput="doSearch('${stage}')">
    <select class="fsel" id="shpf" onchange="doSearch('${stage}')">
      <option value="">All Shop Status</option>${SHOP_ST.map(s=>`<option>${s}</option>`).join('')}
    </select>
    <select class="fsel" onchange="doFlagFilter('${stage}',this.value)">
      <option value="">All Flags</option>
      <option value="title_issue">Title Issue</option>
      <option value="has_claim">Has Claim</option>
      <option value="total_loss">Total Loss</option>
    </select>
    <span style="color:var(--text2);font-size:12px">${rows.length} truck${rows.length!==1?'s':''}</span>
  </div>
  <div class="tbl-wrap"><div class="tbl-scroll">
    <table><thead><tr>
      <th>VIN</th><th>Year/Make/Model</th><th>Cab/Color</th><th>Bed</th>
      <th>Yard</th><th>State</th><th>Mileage</th><th>Repo Agent</th><th>Terminated Date</th><th>Est. Completion</th><th>Shop Status</th><th>Last Worked</th><th>Flags</th>
    </tr></thead>
    <tbody id="tbl-body">${mkRows(rows)}</tbody></table>
  </div></div>`;
}
function fmtDate(d){if(!d)return'-';const p=d.split('-');return p.length===3?p[1]+'/'+p[2]+'/'+p[0]:d;}
function mkRows(rows){
  if(!rows.length)return`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text2)">No trucks in this stage</td></tr>`;
  return rows.map(t=>`<tr onclick="openDetail('${t.id}')">
    <td style="font-family:monospace;font-weight:600">${t.vin||'-'}</td>
    <td>${t.year_make_model||'-'}</td><td>${t.cab_color||'-'}</td><td>${t.bed||'-'}</td>
    <td>${t.yard||'-'}</td><td>${t.state||'-'}</td><td>${t.mileage||'-'}</td>
    <td>${t.repo_agent||'-'}</td><td>${fmtDate(t.terminated_date)}</td><td style="color:#22c55e">${fmtDate(t.est_completion_date)}</td><td style="color:var(--amber);font-size:11px">${t.shop_status||'-'}</td><td>${fmtDate(t.date_last_worked)}</td><td>${flags(t)}${t.photo_link?`<a href='${t.photo_link}' target='_blank' style='color:var(--accent);margin-left:4px;font-size:11px' onclick='event.stopPropagation()'>📷</a>`:''}</td>
  </tr>`).join('');
}
function doSearch(stage){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const sh=document.getElementById('shpf')?.value||'';
  let rows=trucks.filter(t=>t.stage===stage);
  if(q)rows=rows.filter(t=>(t.vin||'').toLowerCase().includes(q)||(t.year_make_model||'').toLowerCase().includes(q)||(t.yard||'').toLowerCase().includes(q));
  if(sh)rows=rows.filter(t=>t.shop_status===sh);
  const b=document.getElementById('tbl-body');if(b)b.innerHTML=mkRows(rows);
}
function doFlagFilter(stage,flag){
  let rows=trucks.filter(t=>t.stage===stage);
  if(flag)rows=rows.filter(t=>t[flag]);
  const b=document.getElementById('tbl-body');if(b)b.innerHTML=mkRows(rows);
}

async function openDetail(id){

  const[{data:n},{data:e},{data:h}]=await Promise.all([
    db.from('notes').select('*').eq('truck_id',id).order('created_at',{ascending:false}),
    db.from('expenses').select('*').eq('truck_id',id).order('date',{ascending:false}),
    db.from('stage_history').select('*').eq('truck_id',id).order('entered_at',{ascending:true})
  ]);
  notes=n||[];exps=e||[];hist=h||[];
  document.getElementById('d-vin').textContent=t.vin||'New Truck';
  document.getElementById('d-ymm').textContent=t.year_make_model||'';
  document.getElementById('d-sbadge').textContent=t.stage||'';
  document.getElementById('d-sbadge').className='sbadge '+(SCSS[t.stage]||'s-intake');

function updLease(){const p=parseFloat(document.getElementById('f-payoff')?.value||0);const b=parseFloat(document.getElementById('f-balloon')?.value||0);document.getElementById('leasebox').innerHTML=calcLease(p,b)}
function calcLease(p,balloon){
  if(!p)return'<span style="color:var(--text3)">Enter payoff to calculate</span>';
  const b=parseFloat(balloon||0);
  const principal=p-b/(Math.pow(1+0.09/12,60));
  const r=0.09/12,n=60,m=principal*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  return`<div style="display:flex;gap:24px;flex-wrap:wrap">
    <div><div style="font-size:11px;color:var(--text2)">Monthly Payment</div><div style="font-size:18px;font-weight:700;color:var(--accent)">$${m.toFixed(2)}</div></div>
    <div><div style="font-size:11px;color:var(--text2)">Total (60mo)</div><div style="font-size:18px;font-weight:700">$${(m*60).toFixed(2)}</div></div>
    ${b?`<div><div style="font-size:11px;color:var(--text2)">Balloon at End</div><div style="font-size:18px;font-weight:700;color:#f59e0b">$${b.toFixed(2)}</div></div>`:''}
  </div>`;
}

    <div class="note-meta"><span style="font-weight:500;color:var(--text)">${n.user_name}</span><span>${new Date(n.created_at).toLocaleString()}</span></div>
    <div class="note-text">${n.content}</div>
  </div>`).join('');
}
async function addNote(){
  const c=document.getElementById('nnote')?.value.trim();if(!c||!truckId)return;
  const{data}=await db.from('notes').insert({truck_id:truckId,user_name:me.name,content:c}).select().single();
  if(data){notes.unshift(data);renderNotes();document.getElementById('nnote').value='';toast('Note added','ok')}
}

function renderExps(){
  const l=document.getElementById('elist'),tot=document.getElementById('etotal');if(!l)return;
  if(!exps.length){l.innerHTML='<div style="color:var(--text3);font-size:12px;padding:4px 0">No expenses</div>';if(tot)tot.innerHTML='';return}
  l.innerHTML=exps.map(e=>`<div class="exp-row">
    <input style="width:130px" type="date" value="${e.date}" class="fi" readonly>
    <input style="flex:1" type="text" value="${e.description}" class="fi" readonly>
    <input style="width:100px" type="number" value="${e.amount}" class="fi" readonly>
    <button class="btn btn-danger btn-xs" onclick="delExp('${e.id}')">×</button>
  </div>`).join('');
  const sum=exps.reduce((a,e)=>a+parseFloat(e.amount||0),0);
  if(tot)tot.innerHTML=`Total: $${sum.toFixed(2)}`;
}
async function addExp(){
  const d=document.getElementById('ned')?.value,desc=document.getElementById('nedd')?.value.trim(),a=parseFloat(document.getElementById('nea')?.value||0);
  if(!d||!desc||!a)return;
  const{data}=await db.from('expenses').insert({truck_id:truckId,date:d,description:desc,amount:a,user_name:me.name}).select().single();
  if(data){exps.unshift(data);renderExps();document.getElementById('nedd').value='';document.getElementById('nea').value='';toast('Added','ok')}
}
async function delExp(id){
  await db.from('expenses').delete().eq('id',id);
  exps=exps.filter(e=>e.id!==id);renderExps();
}

function renderHist(){
  const l=document.getElementById('hlist');if(!l)return;
  if(!hist.length){l.innerHTML='<div style="color:var(--text3);font-size:12px;padding:8px 0">No history yet</div>';return}
  l.innerHTML=hist.map(h=>`<div class="hist-item">
    <span class="hist-stage">${h.stage}</span>

}

async function moveStage(){
  const ns=document.getElementById('d-move').value;if(!ns||!truckId)return;
  const now=new Date().toISOString();
  const{data:cur}=await db.from('stage_history').select('*').eq('truck_id',truckId).is('exited_at',null).maybeSingle();
  if(cur){const hrs=(new Date(now)-new Date(cur.entered_at))/3600000;await db.from('stage_history').update({exited_at:now,duration_hours:hrs}).eq('id',cur.id)}
  await db.from('stage_history').insert({truck_id:truckId,stage:ns,user_name:me.name});
  const{data}=await db.from('trucks').update({stage:ns,updated_at:now,date_last_worked:now.split('T')[0]}).eq('id',truckId).select().single();
  if(data){
    const i=trucks.findIndex(t=>t.id===truckId);if(i>=0)trucks[i]=data;
    document.getElementById('d-sbadge').textContent=ns;
    document.getElementById('d-sbadge').className='sbadge '+(SCSS[ns]||'s-intake');
    document.getElementById('f-stage').value=ns;
    document.getElementById('d-move').value='';
    const{data:h}=await db.from('stage_history').select('*').eq('truck_id',truckId).order('entered_at',{ascending:true});
    hist=h||[];renderHist();updateBadges();toast('Moved to '+ns,'ok');
  }
}

async function delTruck(){
  if(!confirm('Delete this truck permanently?'))return;
  await Promise.all([db.from('trucks').delete().eq('id',truckId),db.from('notes').delete().eq('truck_id',truckId),db.from('expenses').delete().eq('truck_id',truckId),db.from('stage_history').delete().eq('truck_id',truckId)]);
  trucks=trucks.filter(t=>t.id!==truckId);updateBadges();closeDetail();renderTab();toast('Deleted','ok');
}

function renderClaims(m){
  m.innerHTML=`

    <input class="search" id="csrch" placeholder="Search VIN, claim#..." oninput="filterC()">
    <select class="fsel" id="cstf" onchange="filterC()"><option value="">All Statuses</option>${CLAIM_ST.map(s=>`<option>${s}</option>`).join('')}</select>
    <button class="btn btn-primary btn-sm" onclick="openNewClaim()">+ Add Claim</button>
  </div>
  <div class="tbl-wrap"><div class="tbl-scroll">
    <table><thead><tr><th>Date of Loss</th><th>Status</th><th>VIN</th><th>Claim #</th><th>Insurance</th><th>Priority</th><th>Due Date</th><th>Days</th></tr></thead>
    <tbody id="ctbody">${mkClaimRows(claims)}</tbody></table>
  </div></div>`;
}
function mkClaimRows(data){
  if(!data.length)return`<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text2)">No claims</td></tr>`;
  return data.map(c=>{
    const days=c.due_date?Math.round((new Date(c.due_date)-new Date())/86400000):null;
    const dh=days===null?'-':days<0?`<span style="color:#ef4444;font-weight:600">${days}</span>`:days===0?`<span style="color:#f59e0b;font-weight:600">Today</span>`:`<span style="color:#22c55e">${days}</span>`;
    return`<tr onclick="openClaimDetail('${c.id}')">
      <td>${c.date_of_loss||'-'}</td>
      <td><span class="sbadge s-intake" style="font-size:11px">${c.status||''}</span></td>
      <td style="font-family:monospace">${c.vin||'-'}</td>
      <td>${c.claim_number||'-'}</td><td>${c.insurance||'-'}</td>
      <td style="color:${c.priority==='High'?'#ef4444':c.priority==='Medium'?'#f59e0b':'var(--text2)'}">${c.priority||'-'}</td>
      <td>${c.due_date||'-'}</td><td>${dh}</td>
    </tr>`;
  }).join('');
}
function filterC(){
  const q=(document.getElementById('csrch')?.value||'').toLowerCase();
  const st=document.getElementById('cstf')?.value||'';
  let d=[...claims];
  if(q)d=d.filter(c=>(c.vin||'').toLowerCase().includes(q)||(c.claim_number||'').toLowerCase().includes(q)||(c.insurance||'').toLowerCase().includes(q));
  if(st)d=d.filter(c=>c.status===st);
  const b=document.getElementById('ctbody');if(b)b.innerHTML=mkClaimRows(d);
}

async function doSaveClaim(id){
  const data={
    date_of_loss:document.getElementById('cd-dol')?.value||null,
    status:document.getElementById('cd-st')?.value,
    vin:document.getElementById('cd-vin')?.value.trim(),
    claim_number:document.getElementById('cd-cn')?.value.trim(),
    insurance:document.getElementById('cd-ins')?.value.trim(),
    priority:document.getElementById('cd-pri')?.value,
    due_date:document.getElementById('cd-due')?.value||null,
    tib:document.getElementById('cd-tib')?.value.trim(),
    leasing_bank:document.getElementById('cd-lb')?.value.trim(),
    also_notify:document.getElementById('cd-an')?.value,
    waiting_on:document.getElementById('cd-wo')?.value,
    pay_deferred:document.getElementById('cd-pd')?.value,
    problem:document.getElementById('cd-prob')?.value.trim(),
    shah_notes:document.getElementById('cd-sn')?.value.trim(),
    chris_notes:document.getElementById('cd-cn2')?.value.trim(),
    updated_at:new Date().toISOString(),
  };
  let res;
  if(id==='new'){res=await db.from('claims').insert(data).select().single();if(res.data)claims.unshift(res.data)}
  else{res=await db.from('claims').update(data).eq('id',id).select().single();if(res.data){const i=claims.findIndex(c=>c.id===id);if(i>=0)claims[i]=res.data}}
  if(res.data){document.getElementById('cmodal')?.remove();updateBadges();renderClaims(document.getElementById('main'));toast('Claim saved','ok')}
  else toast('Error','err');
}
async function doDelClaim(id){
  if(!confirm('Delete this claim?'))return;
  await db.from('claims').delete().eq('id',id);
  claims=claims.filter(c=>c.id!==id);
  document.getElementById('cmodal')?.remove();
  updateBadges();renderClaims(document.getElementById('main'));toast('Deleted','ok');
}

    <div class="fg"><label class="fl">&nbsp;</label><button class="btn btn-primary" onclick="runReport()">Run Report</button></div>

async function runReport(){
  const fromDate=document.getElementById('rf')?.value;
  const toDate=document.getElementById('rt')?.value;
  const stageFrom=document.getElementById('rsf')?.value;
  const stageTo=document.getElementById('rst')?.value;
  const r=document.getElementById('rresults');
  r.innerHTML='<div style="display:flex;align-items:center;padding:20px 0;color:var(--text2)"><div class="spin"></div>Running report...</div>';

  // Get all stage history with truck info
  let q=db.from('stage_history').select('*, trucks(vin,year_make_model,stage)').order('entered_at',{ascending:true});
  const{data:hist}=await q;
  if(!hist||!hist.length){r.innerHTML='<div style="color:var(--text2);padding:20px 0">No data found</div>';return}

  // Group by truck
  const byTruck={};
  hist.forEach(h=>{
    if(!byTruck[h.truck_id])byTruck[h.truck_id]={vin:h.trucks?.vin,ymm:h.trucks?.year_make_model,currentStage:h.trucks?.stage,stages:[],firstStage:null,lastStage:null};
    byTruck[h.truck_id].stages.push(h);
  });

  // Build one row per truck
  const now=new Date();
  let rows=Object.values(byTruck).map(t=>{
    const stages=t.stages;
    if(!stages.length)return null;
    
    // Find first and last stage
    const first=stages[0];
    const last=stages[stages.length-1];
    const firstStage=first.stage;
    const lastStage=last.stage;
    
    // Total hours from first entry to now (or last exit)
    const startTime=new Date(first.entered_at);
    const endTime=last.exited_at?new Date(last.exited_at):now;
    const totalHours=(endTime-startTime)/3600000;
    
    // Current stage duration
    const currentH=stages.find(s=>!s.exited_at);
    const currentHours=currentH?(now-new Date(currentH.entered_at))/3600000:0;
    
    return{
      vin:t.vin||'-',
      ymm:t.ymm||'-',
      currentStage:t.currentStage||lastStage,
      firstStage,
      lastStage,
      startDate:new Date(first.entered_at).toLocaleDateString(),
      endDate:last.exited_at?new Date(last.exited_at).toLocaleDateString():'Active',
      totalHours,
      totalDays:(totalHours/24).toFixed(1),
      currentStageDays:(currentHours/24).toFixed(1),
      stageCount:stages.length
    };
  }).filter(Boolean);

  // Apply filters
  if(fromDate)rows=rows.filter(r=>new Date(r.startDate)>=new Date(fromDate));
  if(toDate)rows=rows.filter(r=>new Date(r.startDate)<=new Date(toDate));
  if(stageFrom)rows=rows.filter(r=>r.firstStage===stageFrom);
  if(stageTo)rows=rows.filter(r=>r.currentStage===stageTo||r.lastStage===stageTo);

  if(!rows.length){r.innerHTML='<div style="color:var(--text2);padding:20px 0">No trucks found for selected filters</div>';return}

  const avgDays=rows.reduce((a,r)=>a+parseFloat(r.totalDays),0)/rows.length;

  r.innerHTML=`
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <div class="dc" style="padding:10px 14px"><div class="dc-lbl">Trucks</div><div class="dc-num" style="font-size:20px">${rows.length}</div></div>
    <div class="dc" style="padding:10px 14px"><div class="dc-lbl">Avg Total Days</div><div class="dc-num" style="font-size:20px;color:var(--accent)">${avgDays.toFixed(1)}d</div></div>
    <div class="dc" style="padding:10px 14px"><div class="dc-lbl">Avg Total Hours</div><div class="dc-num" style="font-size:20px;color:#22c55e">${Math.round(avgDays*24)}h</div></div>
  </div>
  <div class="tbl-wrap"><div class="tbl-scroll">
    <table><thead><tr>
      <th>VIN</th><th>Vehicle</th><th>Current Stage</th>
      <th>Started In</th><th>Start Date</th><th>Last Date</th>
      <th>Total Days</th><th>Current Stage Days</th><th>Stages Passed</th>
    </tr></thead>
    <tbody>${rows.map(row=>`<tr>
      <td style="font-family:monospace;font-weight:600">${row.vin}</td>
      <td>${row.ymm}</td>
      <td><span class="sbadge ${SCSS[row.currentStage]||'s-intake'}" style="font-size:11px">${row.currentStage}</span></td>
      <td style="color:var(--text2);font-size:11px">${row.firstStage}</td>
      <td>${row.startDate}</td>
      <td>${row.endDate}</td>
      <td style="font-weight:600;color:var(--accent)">${row.totalDays}d</td>
      <td style="color:#f59e0b">${row.currentStageDays}d</td>
      <td style="color:var(--text2)">${row.stageCount}</td>
    </tr>`).join('')}</tbody></table>
  </div></div>`;
}
