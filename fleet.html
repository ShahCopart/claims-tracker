<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#2563eb;--accent2:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#d97706}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:40px;width:400px}
.login-logo{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--accent)}
.login-sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.login-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{background:var(--accent2)}
.login-err{color:#f87171;font-size:12px;margin-top:8px}
.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:6px}
.app-title{font-size:14px;font-weight:700;color:var(--accent)}
.truck-count{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2);margin-left:6px}
.user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text2)}
.admin-badge{background:#1a3a1a;border:1px solid #166534;border-radius:20px;padding:2px 8px;font-size:11px;color:#86efac;margin-left:4px}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto}
.nav::-webkit-scrollbar{height:3px}.nav::-webkit-scrollbar-thumb{background:#333}
.ntab{padding:10px 14px;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s}
.ntab:hover{color:var(--text)}.ntab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.nbadge{background:var(--accent);color:white;border-radius:10px;padding:1px 5px;font-size:10px;margin-left:4px}
.main{flex:1;padding:16px 20px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:var(--red);color:white}
.btn-sm{padding:4px 10px;font-size:11px}.btn-xs{padding:2px 7px;font-size:11px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.search{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text);font-size:13px;width:200px}
.search:focus{outline:none;border-color:var(--accent)}
.fsel{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;cursor:pointer}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl-scroll{overflow-x:auto;max-height:calc(100vh - 230px);overflow-y:auto}
.tbl-scroll::-webkit-scrollbar{width:6px;height:6px}.tbl-scroll::-webkit-scrollbar-track{background:var(--bg3)}.tbl-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:500;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
tbody td{padding:8px 10px;border-bottom:1px solid #111;vertical-align:middle;white-space:nowrap}
tbody tr:hover td{background:#1a1a1a;cursor:pointer}
tbody tr:last-child td{border-bottom:none}
.flag{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px}
.detail-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;flex-direction:column}
.detail-screen.open{display:flex}
.detail-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.detail-vin{font-size:18px;font-weight:700;font-family:monospace}
.detail-body{padding:24px;max-width:1400px;margin:0 auto;width:100%}
.detail-footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;z-index:10}
.sec{margin-bottom:24px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}}
.fg{display:flex;flex-direction:column;gap:4px}.fg.s2{grid-column:span 2}.fg.s4{grid-column:span 4}
.fl{font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
.fi,.fsel2,.fta{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;width:100%}
.fi:focus,.fsel2:focus,.fta:focus{outline:none;border-color:var(--accent)}
.fi[readonly]{opacity:0.6;cursor:not-allowed}
.fta{resize:vertical;min-height:80px;font-family:inherit;line-height:1.6}.fta-lg{min-height:200px}
.checklist{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.ci{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;font-size:12px}
.ci.on{background:#0f2a1a;border-color:#166534}
.ci input{width:15px;height:15px;accent-color:var(--green)}
.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:280px;overflow-y:auto}
.note-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.note-item.auto-note{border-color:#2a3a2a;background:#0f1a0f}
.note-meta{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.note-text{font-size:13px;line-height:1.5;white-space:pre-wrap}
.note-row{display:flex;gap:8px}
.note-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit}
.note-input:focus{outline:none;border-color:var(--accent)}
.exp-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.exp-row input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px}
.stage-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px}
.dash-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:12px;margin-bottom:20px}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.dc-num{font-size:28px;font-weight:700;margin:4px 0}.dc-lbl{font-size:11px;color:var(--text2)}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bk-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.bk-hdr{background:var(--bg3);padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2)}
.bk-row{display:flex;justify-content:space-between;padding:6px 14px;border-bottom:1px solid #111;font-size:12px;cursor:pointer}
.bk-row:hover{background:#1a1a1a}.bk-row:last-child{border-bottom:none}
.bk-cnt{font-weight:600;color:var(--accent)}
.hist-item{display:flex;gap:10px;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid #111}
.hist-stage{color:var(--text);font-weight:500;min-width:160px}.hist-dur{color:var(--accent);min-width:80px}
.lease-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:13px;z-index:9999;animation:fIn 0.2s ease}
.tok-ok{border-color:var(--green);color:#86efac}.tok-err{border-color:var(--red);color:#fca5a5}
@keyframes fIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;display:inline-block;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.sbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.s-repo{background:#3b1a1a;color:#fca5a5}.s-intake{background:#1a2a3b;color:#93c5fd}
.s-manager{background:#2a1a3b;color:#c4b5fd}.s-epika{background:#1a3b2a;color:#6ee7b7}
.s-shop{background:#3b2a1a;color:#fcd34d}.s-insp{background:#1a3b3b;color:#67e8f9}
.s-ready{background:#1a3b1a;color:#86efac}.s-leas{background:#2a3b1a;color:#bef264}
.s-hold{background:#3b3b1a;color:#fde68a}.s-tl{background:#3b1a2a;color:#f9a8d4}
.s-closed{background:#2a2a2a;color:#9ca3af}.s-totals{background:#1a1a1a;color:#6b7280}.s-lm{background:#1a2a3b;color:#7dd3fc}.s-va{background:#2a1a3b;color:#d8b4fe}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:400;display:flex;align-items:center;justify-content:center}
.overlay-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:92vw;max-width:960px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.ov-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:1}
.ov-body{padding:20px;flex:1}
.ov-ftr{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg2)}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;text-decoration:none;cursor:pointer}
.link-btn:hover{background:var(--bg4)}
</style>
</head>
<body>
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">🚛 Fleet Tracker</div>
    <div class="login-sub">Copart Fleet Management System</div>
    <input type="text" id="ln" placeholder="Your full name">
    <input type="email" id="le" placeholder="Work email">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>
<div class="app" id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <div class="app-title">🚛</div>
      <span class="truck-count" id="total-count">0</span>
      <div class="user-badge" id="ubadge"></div>
      <div class="admin-badge" id="admin-badge" style="display:none;cursor:pointer" onclick="showUserManager()">👑 Admin</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex:1;justify-content:center;max-width:600px">
      <input type="text" id="global-search" placeholder="Search VIN, vendor, yard..." style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text);font-size:12px;flex:1;min-width:0" oninput="globalSearch(this.value)">
      <input type="text" id="yard-search" placeholder="Yard #" style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text);font-size:12px;width:70px" oninput="yardSearch(this.value)" list="yard-list">
    </div>
    <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
      <button class="btn btn-secondary btn-sm" onclick="refreshAll()" style="padding:4px 8px" title="Refresh">🔄</button>
      <span id="last-refresh" style="font-size:10px;color:var(--text3);white-space:nowrap"></span>
      <button class="btn btn-primary btn-sm" onclick="openNewTruck()" style="padding:4px 10px">+ Add Truck</button>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()" style="padding:4px 10px">Sign Out</button>
    </div>
  </div>
  <div class="nav" id="main-nav">
    <div class="ntab active" data-tab="dashboard">Dashboard</div>
    <div class="ntab" data-tab="Repo">Repo <span class="nbadge" id="c-Repo">0</span></div>
    <div class="ntab" data-tab="Intake">Intake <span class="nbadge" id="c-Intake">0</span></div>
    <div class="ntab" data-tab="Manager Review">Manager Review <span class="nbadge" id="c-Manager_Review">0</span></div>
    <div class="ntab" data-tab="Epika">Epika <span class="nbadge" id="c-Epika">0</span></div>
    <div class="ntab" data-tab="At Shop">At Shop <span class="nbadge" id="c-At_Shop">0</span></div>
    <div class="ntab" data-tab="Final Inspection">Final Inspection <span class="nbadge" id="c-Final_Inspection">0</span></div>
    <div class="ntab" data-tab="Ready to Assign">Ready to Assign <span class="nbadge" id="c-Ready_to_Assign">0</span></div>
    <div class="ntab" data-tab="In Leasing">In Leasing <span class="nbadge" id="c-In_Leasing">0</span></div>
    <div class="ntab" data-tab="Leased Trucks Maintenance">Leased Maint. <span class="nbadge" id="c-Leased_Trucks_Maintenance">0</span></div>
    <div class="ntab" data-tab="Vendor Assist">Vendor Assist <span class="nbadge" id="c-Vendor_Assist">0</span></div>
    <div class="ntab" data-tab="Hold 4 Cars">Hold 4 Cars <span class="nbadge" id="c-Hold_4_Cars">0</span></div>
    <div class="ntab" data-tab="Total Loss">Total Loss <span class="nbadge" id="c-Total_Loss">0</span></div>
    <div class="ntab" data-tab="Reassignment Closed">Reassignment Closed <span class="nbadge" id="c-Reassignment_Closed">0</span></div>
    <div class="ntab" data-tab="Closed - Totals Only">Totals Only <span class="nbadge" id="c-Closed_-_Totals_Only">0</span></div>
    <div class="ntab" data-tab="claims">Claims <span class="nbadge" id="c-claims">0</span></div>
    <div class="ntab" data-tab="report">Reports</div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="detail-screen" id="dscreen">
  <div class="detail-header">
    <div>
      <div class="detail-vin" id="d-vin">-</div>
      <div style="font-size:13px;color:var(--text2);margin-top:2px" id="d-ymm">-</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="d-sbadge" class="sbadge s-intake">-</span>
      <div id="d-flags"></div>
      <button class="btn btn-secondary btn-sm" onclick="refreshDetail()">🔄</button>
      <button class="btn btn-secondary btn-sm" onclick="closeDetail()">✕ Close</button>
    </div>
  </div>
  <div class="detail-body" id="dbody"></div>
  <div class="detail-footer">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="font-size:12px;color:var(--text2)">Move to:</label>
      <select class="stage-sel" id="d-move" onchange="moveStage()">
        <option value="">Select stage...</option>
        <option>Repo</option><option>Intake</option><option>Manager Review</option>
        <option>Epika</option><option>At Shop</option><option>Final Inspection</option>
        <option>Ready to Assign</option><option>In Leasing</option>
        <option>Leased Trucks Maintenance</option><option>Vendor Assist</option>
        <option>Hold 4 Cars</option><option>Total Loss</option><option>Reassignment Closed</option><option>Closed - Totals Only</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="emailTruck()">📧 Email</button>
      <button class="btn btn-secondary btn-sm" onclick="findShop()" style="background:rgba(6,182,212,0.1);border-color:#06b6d4;color:#67e8f9">🔧 Find Shop</button>
      <button class="btn btn-danger btn-sm" id="del-btn" onclick="delTruck()" style="display:none">🗑 Delete</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="closeDetail()">Cancel</button>
      <button class="btn btn-secondary" onclick="saveTruck()">💾 Save</button>
      <button class="btn btn-primary" onclick="saveTruck(true)">💾 Save & Close</button>
    </div>
  </div>
</div>
<datalist id="yard-list"></datalist>
<datalist id="state-list"></datalist>
<script>
const SB_URL='https://grillezennazhgruvtav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyaWxsZXplbm5hemhncnV2dGF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzAxMzMsImV4cCI6MjA5NTIwNjEzM30.CVbSaQ04mI8L7RUF8KEFGqQKskumFVGyJczP1RjwKkE';
const db=supabase.createClient(SB_URL,SB_KEY);
const ADMIN_EMAIL='khurram.shah@copart.com';

// Populate datalists
(function(){
  var yd=document.getElementById('yard-list');
  for(var i=1;i<=400;i++){var o=document.createElement('option');o.value='Yard '+i;yd.appendChild(o);}
  var sl=document.getElementById('state-list');
  ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'].forEach(function(s){var o=document.createElement('option');o.value=s;sl.appendChild(o);});
})();

var me=null,tab='dashboard',truckId=null,isAdmin=false;
var trucks=[],claims=[],notes=[],exps=[],hist=[];
var _sortField=null,_sortAsc=true;

const STAGES=['Repo','Intake','Manager Review','Epika','At Shop','Final Inspection','Ready to Assign','In Leasing','Leased Trucks Maintenance','Vendor Assist','Hold 4 Cars','Total Loss','Reassignment Closed','Closed - Totals Only'];
const AUTO_DATE_STAGES=['Intake','Manager Review','Final Inspection'];
const SHOP_ST=['Under Review','Dispatched to Shop','Arrived at Shop','Waiting for Estimate','Pending Approval','Approved - Work Requested','Work in Progress','Work Complete','Dispatched Back to Yard','Arrived - Needs Wash & Inspection','Transit Pros'];
const CLAIM_ST=['Open','In Progress','Pending','Under Review','Urgent Review','Approved','Denied','On Hold','Follow Up','Follow Up with GM','Follow Up with Maintenance','Following Up with Insurance','Follow Up on Documents','Follow Up with Leasing CO','Pending Total Loss','Pending Completion','Pending Check','Pending Rejection','Pending Estimate','Pending Pay Off','Pending Pictures','Pending Legal','Pending Complete','Shah Working On','Complete','Done'];
const SCSS={Repo:'s-repo',Intake:'s-intake','Manager Review':'s-manager',Epika:'s-epika','At Shop':'s-shop','Final Inspection':'s-insp','Ready to Assign':'s-ready','In Leasing':'s-leas','Leased Trucks Maintenance':'s-lm','Vendor Assist':'s-va','Hold 4 Cars':'s-hold','Total Loss':'s-tl','Reassignment Closed':'s-closed','Closed - Totals Only':'s-totals'};

function _showActive(){var al=trucks.filter(function(t){return !['Reassignment Closed','Closed - Totals Only'].includes(t.stage)&&!t.is_archived;});showTruckList('Active Trucks',al);}
function _showClosed(){var cl=trucks.filter(function(t){return ['Reassignment Closed','Closed - Totals Only'].includes(t.stage)||t.is_archived;});showTruckList('Closed / Archived',cl);}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.ntab').forEach(function(el){
    el.addEventListener('click',function(){doTab(this.getAttribute('data-tab'),this);});
  });
  document.body.addEventListener('click',function(e){
    var a3=e.target.closest('[data-action3]');
    if(a3&&a3.getAttribute('data-action3')==='goStage'){
      var stage=a3.getAttribute('data-stage');
      if(stage)clickStage(stage);
    }
    var a2=e.target.closest('[data-action2]');
    if(a2){
      var act=a2.getAttribute('data-action2');
      var tid=a2.getAttribute('data-truck-id');

    }
    // data-action2 handled by body listener
  });
});

async function doLogin(){
  var name=document.getElementById('ln').value.trim();
  var email=document.getElementById('le').value.trim().toLowerCase();
  var err=document.getElementById('lerr');
  if(!name||!email){err.textContent='Enter name and email';return;}
  err.textContent='Signing in...';
  try{
    var r=await db.from('users').select('*').eq('email',email).maybeSingle();
    if(r.error)throw r.error;
    var u=r.data;
    if(!u){var r2=await db.from('users').insert({name:name,email:email}).select().single();if(r2.error)throw r2.error;u=r2.data;}
    me=u||{name:name,email:email};
    isAdmin=(email===ADMIN_EMAIL||(me&&me.role==='admin'));
    localStorage.setItem('ft_user',JSON.stringify(me));
    err.textContent='';bootApp();
  }catch(ex){err.textContent='Error: '+(ex.message||'Connection failed');}
}

async function loadProductivity(modal){
  // Always calculate today's count for the card
  var today=new Date();today.setHours(0,0,0,0);
  var res=await db.from('notes')
    .select('user_name,truck_id,created_at')
    .gte('created_at',today.toISOString())
    .order('created_at',{ascending:false});

  // Build stats
  var byUser={};
  (res.data||[]).forEach(function(n){
    if(!n.user_name)return;
    if(!byUser[n.user_name])byUser[n.user_name]={trucks:new Set(),notes:0};
    byUser[n.user_name].trucks.add(n.truck_id);
    byUser[n.user_name].notes++;
  });
  var sorted=Object.keys(byUser).map(function(name){
    return{name:name,trucks:byUser[name].trucks.size,notes:byUser[name].notes};
  }).sort(function(a,b){return b.trucks-a.trucks;});

  // Always update card count
  var todayTotal=sorted.reduce(function(s,u){return s+u.trucks;},0);
  var pc=document.getElementById('prod-count');
  var ps=document.getElementById('prod-sub');
  if(pc)pc.textContent=todayTotal;
  if(ps)ps.textContent='by '+sorted.length+' user'+(sorted.length!==1?'s':'')+' today';

  if(!modal)return;

  // Modal mode - fetch with filters
  var filterId='prod-modal-filter';
  var filter=document.getElementById(filterId)?document.getElementById(filterId).value:'today';
  var since=new Date();
  if(filter==='today'){since.setHours(0,0,0,0);}
  else if(filter==='week'){since.setDate(since.getDate()-since.getDay());since.setHours(0,0,0,0);}
  else if(filter==='month'){since.setDate(1);since.setHours(0,0,0,0);}

  // Populate user dropdown
  var uf=document.getElementById('prod-modal-user');
  if(uf&&uf.options.length<=1){
    var usrs=await db.from('users').select('name').order('name');
    if(usrs.data)usrs.data.forEach(function(u){
      var o=document.createElement('option');o.value=u.name;o.textContent=u.name;uf.appendChild(o);
    });
  }
  var selectedModalUser=uf?uf.value:'';

  var q2=db.from('notes').select('user_name,truck_id,created_at').gte('created_at',since.toISOString());
  if(selectedModalUser)q2=q2.eq('user_name',selectedModalUser);
  var res2=await q2;

  var byUser2={};
  (res2.data||[]).forEach(function(n){
    if(!n.user_name)return;
    if(!byUser2[n.user_name])byUser2[n.user_name]={trucks:new Set(),notes:0};
    byUser2[n.user_name].trucks.add(n.truck_id);
    byUser2[n.user_name].notes++;
  });
  var sorted2=Object.keys(byUser2).map(function(name){
    return{name:name,trucks:byUser2[name].trucks.size,notes:byUser2[name].notes};
  }).sort(function(a,b){return b.trucks-a.trucks;});

  var el=document.getElementById('productivity-list-modal');
  if(!el)return;
  if(!sorted2.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text2)">No activity in this period</div>';return;}
  var max=sorted2[0].trucks||1;
  el.innerHTML=sorted2.map(function(u){
    var pct=Math.round((u.trucks/max)*100);
    var isMe=me&&u.name===me.name;
    return '<div style="margin-bottom:12px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
      '<span style="font-size:13px;font-weight:'+(isMe?'700':'400')+';color:'+(isMe?'var(--accent)':'var(--text)')+'">'+u.name+(isMe?' (you)':'')+'</span>'+
      '<div style="display:flex;gap:16px;font-size:12px">'+
      '<span style="color:var(--accent);font-weight:600">'+u.trucks+' truck'+(u.trucks!==1?'s':'')+'</span>'+
      '<span style="color:var(--text2)">'+u.notes+' action'+(u.notes!==1?'s':'')+'</span>'+
      '</div></div>'+
      '<div style="background:var(--bg3);border-radius:4px;height:8px;overflow:hidden">'+
      '<div style="background:var(--accent);height:100%;width:'+pct+'%;border-radius:4px;transition:width 0.5s"></div>'+
      '</div></div>';
  }).join('');
}

      else if(action.startsWith('[STAGE'))actionLabel='📦 Stage updated';
      else if(action.toLowerCase().includes('approv'))actionLabel='✅ Approved estimate';
      else if(action.trim().length>0)actionLabel='📝 '+action.substring(0,50).trim()+(action.length>50?'...':'');

      return '<div data-action2="openFromRecent" data-truck-id="'+(t.id||n.truck_id)+'" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111;cursor:pointer">'+

        '<span style="font-size:11px;color:var(--text3)">'+when+'</span>'+
        '</div>'+
        '</div>';
    }).join('');

async function loadAvgCycleTime(){
  var el=document.getElementById('avg-cycle');if(!el)return;
  // Use trucks with both intake_date and ready_date set
  var res=await db.from('trucks')
    .select('intake_date,ready_date,date_last_worked,stage')
    .not('intake_date','is',null)
    .limit(500);
  if(!res.data||!res.data.length){el.textContent='N/A';return;}
  var cycles=[];
  res.data.forEach(function(t){
    var startDate=t.intake_date;
    // End date: ready_date if set, or date_last_worked for active trucks
    var endDate=t.ready_date||t.date_last_worked;
    if(!startDate||!endDate)return;
    var days=(new Date(endDate)-new Date(startDate))/86400000;
    if(days>0&&days<500)cycles.push(days);
  });
  if(!cycles.length){el.textContent='N/A';return;}
  var avg=cycles.reduce(function(a,b){return a+b;},0)/cycles.length;
  // Also calc active only
  var activeCycles=[];
  res.data.forEach(function(t){
    if(!t.intake_date||t.ready_date)return; // skip completed
    if(!t.date_last_worked)return;
    var days=(new Date(t.date_last_worked)-new Date(t.intake_date))/86400000;
    if(days>0&&days<500)activeCycles.push(days);
  });
  var avgActive=activeCycles.length?activeCycles.reduce(function(a,b){return a+b;},0)/activeCycles.length:0;
  el.textContent=Math.round(avg)+'d';
  // Show tooltip with more detail
  el.title='All trucks avg: '+Math.round(avg)+'d | Active trucks: '+Math.round(avgActive)+'d';
  var sub=document.getElementById('cycle-sub');
  if(sub)sub.textContent=cycles.length+' trucks tracked';
}

function fmtDate(d){if(!d)return'-';var p=String(d).split('-');return p.length===3?p[1]+'/'+p[2]+'/'+p[0]:d;}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function getDaysSince(t){if(!t.date_last_worked)return 999;return Math.floor((new Date()-new Date(t.date_last_worked))/86400000);}
function isOverdue(t){if(t.est_completion_date&&new Date(t.est_completion_date)>new Date())return false;return getDaysSince(t)>=2;}

function flags(t){
  var f='';
  if(t.sublot)f+='<span style="background:#1e3a5f;color:#60a5fa;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;font-weight:600" title="Sublot">SUB</span>';
  if(t.needs_mgr_review)f+='<span class="flag" style="background:#f59e0b;width:10px;height:10px" title="Manager Review Needed"></span>';
  if(t.needs_approval)f+='<span class="flag" style="background:#06b6d4;width:10px;height:10px" title="Approval Needed"></span>';
  if(t.title_issue)f+='<span class="flag" style="background:#ef4444" title="Title Issue"></span>';
  if(t.has_claim)f+='<span class="flag" style="background:#f59e0b" title="Has Claim"></span>';
  if(t.total_loss)f+='<span class="flag" style="background:#a78bfa" title="Total Loss"></span>';
  var ht=t.tracker_gs||t.tracker_azuga||t.tracker_samsara;
  f+='<span class="flag" style="background:'+(ht?'#22c55e':'#6b7280')+'" title="'+(ht?'Tracker OK':'No Tracker')+'"></span>';
  return f;
}

function mkRows(rows){
  if(!rows.length)return '<tr><td colspan="14" style="text-align:center;padding:40px;color:var(--text2)">No trucks in this stage</td></tr>';
  // Default sort: overdue first
  var sf=document.getElementById('sortf')?document.getElementById('sortf').value:'';
  var sd=document.getElementById('sortd')?document.getElementById('sortd').value:'asc';
  if(sf){
    rows=rows.slice().sort(function(a,b){
      var av=sf==='days'?getDaysSince(a):(a[sf]||'');
      var bv=sf==='days'?getDaysSince(b):(b[sf]||'');
      var r=typeof av==='string'?av.localeCompare(bv):av-bv;
      return sd==='desc'?-r:r;
    });
  } else {
    rows=rows.slice().sort(function(a,b){
      var ao=isOverdue(a),bo=isOverdue(b);
      if(ao&&!bo)return -1;if(!ao&&bo)return 1;
      return getDaysSince(b)-getDaysSince(a);
    });
  }
  return rows.map(function(t){
    var pi=t.photo_link?'<a href="'+t.photo_link+'" target="_blank" style="color:var(--accent);margin-left:4px;font-size:11px" onclick="event.stopPropagation()">📷</a>':'';
    var ov=isOverdue(t),days=getDaysSince(t);
    var daysStr=days===999?'-':days===0?'Today':days+'d ago';
    var daysColor=ov?'#ef4444':days===1?'#f59e0b':'#22c55e';
    var rowStyle=ov?'background:rgba(220,38,38,0.08);border-left:3px solid #ef4444':'';
    return '<tr data-id="'+t.id+'" class="truck-row" style="cursor:pointer;'+rowStyle+'">'+
      '<td style="font-family:monospace;font-weight:600">'+(t.vin||'-')+'</td>'+
      '<td>'+(t.year_make_model||'-')+'</td><td>'+(t.cab_color||'-')+'</td><td>'+(t.bed||'-')+'</td>'+
      '<td>'+(t.yard||'-')+'</td><td>'+(t.state||'-')+'</td><td>'+(t.mileage||'-')+'</td>'+
      '<td>'+(t.repo_agent||'-')+'</td>'+
      '<td>'+fmtDate(t.terminated_date)+'</td>'+
      '<td style="color:#22c55e">'+fmtDate(t.est_completion_date)+'</td>'+
      '<td style="color:var(--amber);font-size:11px">'+(t.shop_status||'-')+'</td>'+
      '<td>'+fmtDate(t.date_last_worked)+'</td>'+
      '<td style="color:'+daysColor+';font-weight:'+(ov?'700':'400')+'">'+daysStr+'</td>'+
      '<td>'+flags(t)+pi+'</td></tr>';
  }).join('');
}

function doSearch(){

function yardSearch(q){
  if(!q||q.length<1){
    var el=document.getElementById('yard-search-modal');if(el)el.remove();
    return;
  }
  q=q.toLowerCase().trim();
  // Try exact match first, then partial if no results
  var results=trucks.filter(function(t){
    var yard=(t.yard||'').toLowerCase().trim();
    // Extract just the number from the search query
    var num=q.replace(/[^0-9]/g,'');
    if(num){
      // Match exact yard number - e.g. "1" should not match "10", "11", "100"
      var yardNum=(yard.match(/\d+/)||[''])[0];
      return yardNum===num;
    }
    return yard.includes(q);
  });
  // Show results in a dropdown-style panel
  var old=document.getElementById('yard-search-panel');if(old)old.remove();
  if(!results.length)return;
  var panel=document.createElement('div');
  panel.id='yard-search-panel';
  panel.style.cssText='position:fixed;top:52px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:200;max-height:70vh;overflow-y:auto;width:900px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,0.5)';
  var rows=results.map(function(t){
    var days=Math.floor((new Date()-new Date(t.date_last_worked||t.created_at))/86400000);
    var when=isNaN(days)?'-':days===0?'Today':days+'d ago';
    return '<div data-action2="openFromYard" data-truck-id="'+t.id+'" style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid #111;cursor:pointer">'+
      '<div>'+
      '<span style="font-family:monospace;font-weight:700;font-size:12px;color:var(--text)">'+(t.vin||'—')+'</span>'+
      '<span style="color:var(--text2);font-size:11px;margin-left:8px">'+(t.year_make_model||'')+'</span>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
      '<span style="font-size:11px;color:var(--accent)">'+(t.yard||'')+'</span>'+
      (t.sublot?'<span style="background:#1e3a5f;color:#60a5fa;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600">SUBLOT</span>':'')+
      '<span class="sbadge '+(SCSS[t.stage]||'s-intake')+'" style="font-size:10px">'+(t.stage||'')+'</span>'+
      '<span style="font-size:11px;color:var(--text2)">'+(t.vendor_short_name||'')+'</span>'+
      '<span style="font-size:11px;color:var(--text3)">'+when+'</span>'+
      '</div>'+
      '</div>';
  }).join('');
  panel.innerHTML=
    '<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">'+
    '<span style="font-size:13px;font-weight:600">🏭 '+results.length+' truck'+(results.length!==1?'s':'')+' in yards matching "'+q+'"</span>'+
    '<button id="yard-panel-close" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px">✕</button>'+
    '</div>'+
    rows;
  document.body.appendChild(panel);
  document.getElementById('yard-panel-close').onclick=function(){panel.remove();document.getElementById('yard-search').value='';};
  // Close on outside click
  setTimeout(function(){
    document.addEventListener('click',function handler(e){
      if(!panel.contains(e.target)&&e.target.id!=='yard-search'){
        panel.remove();
        document.removeEventListener('click',handler);
      }
    });
  },100);
}

async function loadApprovalData(id){
  // Fetch fresh truck data to get estimate_price and links
  var tr=await db.from('trucks').select('*').eq('id',id).single();
  var t=tr.data||{};
  
  // Update estimate price display
  var epEl=document.getElementById('est-price-'+id);
  if(epEl){
    if(t.estimate_price){
      epEl.textContent='$'+parseFloat(t.estimate_price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      epEl.style.color='#06b6d4';
    } else {
      epEl.textContent='Not set';
    }
  }

  // Update links
  var linksEl=document.getElementById('links-'+id);
  if(linksEl){
    var links='';
    if(t.estimates_link)links+='<a href="'+t.estimates_link+'" target="_blank" class="link-btn" style="font-size:12px;background:rgba(6,182,212,0.15);border-color:#06b6d4">📋 Estimates Folder</a> ';
    if(t.photo_link)links+='<a href="'+t.photo_link+'" target="_blank" class="link-btn" style="font-size:12px">📷 Photos Folder</a> ';
    if(t.inspections_link)links+='<a href="'+t.inspections_link+'" target="_blank" class="link-btn" style="font-size:12px">📁 Inspections</a> ';
    if(t.invoice_link)links+='<a href="'+t.invoice_link+'" target="_blank" class="link-btn" style="font-size:12px">📁 Invoices</a> ';
    if(t.misc_link)links+='<a href="'+t.misc_link+'" target="_blank" class="link-btn" style="font-size:12px">📎 Misc</a> ';
    linksEl.innerHTML=links||'<span style="color:var(--text3);font-size:12px">No OneDrive links saved for this truck</span>';
  }

  // Load expenses
  var er=await db.from('expenses').select('amount').eq('truck_id',id);
  var total=(er.data||[]).reduce(function(sum,e){return sum+parseFloat(e.amount||0);},0);
  var etEl=document.getElementById('exp-total-'+id);
  if(etEl)etEl.textContent='$'+total.toFixed(2);

  // Load notes - prioritize approval request notes
  var nr=await db.from('notes').select('user_name,content,created_at').eq('truck_id',id).order('created_at',{ascending:false}).limit(10);
  var nEl=document.getElementById('notes-'+id);
  if(nEl){
    if(nr.data&&nr.data.length){
      nEl.style.fontStyle='normal';
      // Show approval-related notes first, then recent notes
      var approvalNotes=nr.data.filter(function(n){return n.content.toLowerCase().includes('approval')||n.content.toLowerCase().includes('estimate')||n.content.toLowerCase().includes('approve');});
      var otherNotes=nr.data.filter(function(n){return !n.content.toLowerCase().includes('approval')&&!n.content.toLowerCase().includes('estimate')&&!n.content.toLowerCase().includes('approve');}).slice(0,2);
      var displayNotes=approvalNotes.length?approvalNotes.concat(otherNotes):nr.data.slice(0,3);
      nEl.innerHTML=displayNotes.map(function(n){
        var isApprovalNote=n.content.toLowerCase().includes('approval')||n.content.toLowerCase().includes('estimate');
        return '<div style="margin-bottom:6px;padding:8px 10px;background:'+(isApprovalNote?'rgba(6,182,212,0.08)':'var(--bg)')+';border:1px solid '+(isApprovalNote?'#06b6d4':'var(--border)')+';border-radius:4px">'+
          '<div style="font-size:10px;color:'+(isApprovalNote?'#67e8f9':'var(--text2)')+';margin-bottom:4px;font-weight:600">'+
          (isApprovalNote?'📋 ':'')+ n.user_name+' · '+new Date(n.created_at).toLocaleDateString()+'</div>'+
          '<div style="font-size:12px;color:var(--text);line-height:1.5">'+n.content.substring(0,300)+(n.content.length>300?'...':'')+'</div>'+
          '</div>';
      }).join('');
    }else{
      nEl.innerHTML='<div style="color:var(--text3);font-style:italic">No notes yet — add details about this estimate before requesting approval</div>';
    }
  }
}

async function approveEstimate(id){
  var t=trucks.find(function(x){return x.id===id;});
  if(!t)return;
  var approverName=me?me.name:'Manager';
  var timestamp=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
  var noteContent='✅ APPROVED by '+approverName+' on '+timestamp+' — Estimate approved. Work authorized to proceed.';

  // Insert approval note
  await db.from('notes').insert({truck_id:id,user_name:approverName,content:noteContent});
  // Remove needs_approval flag
  await db.from('trucks').update({needs_approval:false,updated_at:new Date().toISOString()}).eq('id',id);
  // Update local cache
  var idx=trucks.findIndex(function(x){return x.id===id;});
  if(idx>=0)trucks[idx].needs_approval=false;

  // Remove card from modal
  var card=document.getElementById('acard-'+id);
  if(card){
    card.style.opacity='0.5';
    card.innerHTML='<div style="text-align:center;padding:20px;color:#86efac;font-size:14px;font-weight:600">✅ Approved! Note added to truck record.</div>';
    setTimeout(function(){card.remove();},2000);
  }

  updateBadges();
  // Update recently approved count on dashboard card
  var rc=document.getElementById('recent-count');
  if(rc){
    var cur=parseInt(rc.textContent)||0;
    rc.textContent=cur+1;
  }
  // Full reload if on dashboard
  if(tab==='dashboard')loadRecentApprovals();
  toast('✅ Approved! Note saved.','ok');
}

async function openDetail(id){
  window._lastTab=tab;truckId=id;
  var fresh=await db.from('trucks').select('*').eq('id',id).single();
  var t=fresh.data||trucks.find(function(x){return x.id===id;})||{};
  var idx=trucks.findIndex(function(x){return x.id===id;});if(idx>=0&&fresh.data)trucks[idx]=fresh.data;
  // Store original state for change detection
  window._origTruck=JSON.parse(JSON.stringify(t));
  var r1=await db.from('notes').select('*').eq('truck_id',id).order('created_at',{ascending:false});
  var r2=await db.from('expenses').select('*').eq('truck_id',id).order('date',{ascending:false});
  var r3=await db.from('stage_history').select('*').eq('truck_id',id).order('entered_at',{ascending:true});
  notes=r1.data||[];exps=r2.data||[];hist=r3.data||[];
  document.getElementById('d-vin').textContent=t.vin||'New Truck';
  document.getElementById('d-ymm').textContent=t.year_make_model||'';
  document.getElementById('d-sbadge').textContent=t.stage||'';
  document.getElementById('d-sbadge').className='sbadge '+(SCSS[t.stage]||'s-intake');
  document.getElementById('d-flags').innerHTML=flags(t);
  document.getElementById('d-move').value='';
  document.getElementById('dbody').innerHTML=buildForm(t);
  document.getElementById('dscreen').classList.add('open');
  renderNotes();renderExps();renderHist();
  // Add Enter key listener to estimate price field
  setTimeout(function(){
    var ep=document.getElementById('f-estprice');
    if(ep){ep.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();checkEstimatePrice(ep);}});}
  },100);
}

function buildLinkField(label,id,val){
  var html='<div class="fg"><label class="fl">'+label+'</label>';
  html+='<div style="display:flex;gap:6px;align-items:center">';
  if(val){
    html+='<a href="'+val+'" target="_blank" class="link-btn">'+label.split(' ')[0]+' Open 🔗</a>';
    html+='<button class="btn btn-secondary btn-xs" onclick="editLinkField(\''+id+'\')">✏️ Edit</button>';
    html+='<input type="hidden" id="'+id+'" value="'+val+'">';
  } else {
    html+='<input class="fi" id="'+id+'" value="" placeholder="Paste link..." style="font-size:12px">';
  }
  html+='</div></div>';
  return html;
}

function editLinkField(id){
  var inp=document.getElementById(id);
  var cur=inp?inp.value:'';
  var newVal=prompt('Enter link for '+id.replace('f-','').replace('link','').replace(/-/g,' ')+':',cur);
  if(newVal!==null){
    if(!inp){inp=document.createElement('input');inp.type='hidden';inp.id=id;document.body.appendChild(inp);}
    inp.value=newVal;
    toast('Link updated — click Save to apply','ok');

}

function updLease(){
  var p=parseFloat(document.getElementById('f-payoff').value||0);
  var b=parseFloat(document.getElementById('f-balloon').value||0);
  var r=parseFloat(document.getElementById('f-rate').value||9);
  document.getElementById('leasebox').innerHTML=calcLease(p,b,r);
}

function calcLease(p,balloon,rate){
  if(!p)return '<span style="color:var(--text3)">Enter payoff to calculate</span>';
  var b=parseFloat(balloon||0),r=parseFloat(rate||9);
  var principal=p-b/Math.pow(1+r/100/12,60);
  var mr=r/100/12,n=60,m=principal*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);
  return '<div style="display:flex;gap:24px;flex-wrap:wrap">'+
    '<div><div style="font-size:11px;color:var(--text2)">Monthly @ '+r+'%</div><div style="font-size:18px;font-weight:700;color:var(--accent)">$'+m.toFixed(2)+'</div></div>'+
    '<div><div style="font-size:11px;color:var(--text2)">Total (60mo)</div><div style="font-size:18px;font-weight:700">$'+(m*60).toFixed(2)+'</div></div>'+
    (b?'<div><div style="font-size:11px;color:var(--text2)">Balloon</div><div style="font-size:18px;font-weight:700;color:#f59e0b">$'+b.toFixed(2)+'</div></div>':'')+
    '</div>';
}

async function saveTruck(closeAfter){
  // Check if estimate price changed without completing the note prompt
  var estInp=document.getElementById('f-estprice');
  if(estInp){
    var newPrice=parseFloat(estInp.value)||0;
    var origPrice=parseFloat(estInp.getAttribute('data-orig-price'))||0;
    if(newPrice>0&&Math.abs(newPrice-origPrice)>0.01){
      showEstimateNotePrompt(newPrice,estInp);
      toast('Please complete the estimate note before saving','err');
      return;
    }
  }
  var prevTruck=window._origTruck||trucks.find(function(t){return t.id===truckId;})||{};
  var newStage=getFormVal('f-stage');
  var newShop=getFormVal('f-shopst')||null;
  var estComp=getFormVal('f-estcomp')||null;
  if(AUTO_DATE_STAGES.includes(newStage)&&newStage!==prevTruck.stage&&!estComp){
    estComp=addDays(2);document.getElementById('f-estcomp').value=estComp;
  }
  var intakeDate=getFormVal('f-intake')||null;
  if(newStage==='Intake'&&!intakeDate){intakeDate=today();document.getElementById('f-intake').value=intakeDate;}

  var data={
    vin:getFormVal('f-vin'),year_make_model:getFormVal('f-ymm'),cab_color:getFormVal('f-cab'),
    bed:getFormVal('f-bed'),mileage:getFormVal('f-mil'),yard:getFormVal('f-yard'),state:getFormVal('f-state'),sublot:getFormCheck('f-sublot'),
    stage:newStage,shop_status:newShop,
    estimate_price:parseFloat(getFormVal('f-estprice'))||null,
    repo_agent:getFormVal('f-repoagent')||null,
    terminated_date:getFormVal('f-termdate')||null,recovery_date:getFormVal('f-recov')||null,
    est_completion_date:estComp,intake_date:intakeDate,ready_date:getFormVal('f-ready')||null,
    assigned_date:getFormVal('f-assign')||null,pickup_date:getFormVal('f-pickup')||null,
    date_last_worked:today(),leasing_company:getFormVal('f-lco'),applicant_name:getFormVal('f-app'),
    vendor_short_name:getFormVal('f-vsn'),vendor_id:getFormVal('f-vid'),
    old_vendor_name:getFormVal('f-oldvendor')||null,
    estimated_payoff:parseFloat(getFormVal('f-payoff'))||null,
    balloon_payment:parseFloat(getFormVal('f-balloon'))||null,
    interest_rate:parseFloat(getFormVal('f-rate'))||9,
    photo_link:getFormVal('f-photolink')||null,
    invoice_link:getFormVal('f-invoicelink')||null,
    expenses_link:getFormVal('f-explink')||null,
    inspections_link:getFormVal('f-insplink')||null,
    estimates_link:getFormVal('f-estlink')||null,
    misc_link:getFormVal('f-misclink')||null,
    title_issue:getFormCheck('f-ti'),total_loss:getFormCheck('f-tl'),has_claim:getFormCheck('f-hc'),
    needs_approval:getFormCheck('f-approval'),
    needs_mgr_review:getFormCheck('f-mgr-review'),
    photos_taken:getFormCheck('f-ph'),pm_done:getFormCheck('f-pm'),batteries_installed:getFormCheck('f-bat'),
    windshield_done:getFormCheck('f-ws'),tires_changed:getFormCheck('f-tr'),electrical_issues:getFormCheck('f-el'),
    check_engine:getFormCheck('f-ce'),bed_works:getFormCheck('f-bw'),body_condition:getFormVal('f-bc')||null,
    deidentified:getFormCheck('f-di'),supplies_ordered:getFormCheck('f-so'),
    aei_inspection:getFormCheck('f-aei'),copart_inspection:getFormCheck('f-copart'),
    tracker_gs:getFormCheck('f-gs'),tracker_azuga:getFormCheck('f-az'),tracker_samsara:getFormCheck('f-sa'),
    updated_at:new Date().toISOString()
  };
  var vap=document.getElementById('f-vapayer');if(vap)data.va_payer=vap.value||null;
  var vad=document.getElementById('f-vadesc');if(vad)data.va_description=vad.value.trim()||null;

  var res;
  if(truckId){res=await db.from('trucks').update(data).eq('id',truckId).select().single();}
  else{res=await db.from('trucks').insert(data).select().single();truckId=res.data?res.data.id:null;if(res.data)await db.from('stage_history').insert({truck_id:res.data.id,stage:data.stage||'Intake',user_name:me.name});}

  if(res.data){
    // Auto-save any pending note in the textarea (e.g. estimate notes)
    var pendingNote=document.getElementById('nnote')?document.getElementById('nnote').value.trim():'';
    var autoNotes=[];
    if(prevTruck.stage&&prevTruck.stage!==data.stage&&data.stage)autoNotes.push('[STAGE CHANGE] '+prevTruck.stage+' -> '+data.stage);
    if(prevTruck.shop_status!==data.shop_status&&data.shop_status)autoNotes.push('[SHOP STATUS] Changed to: '+data.shop_status);
    // Track checkbox changes
    var checkboxFields=[
      ['pm_done','✅ PM Done'],['photos_taken','📷 Photos Taken'],['batteries_installed','🔋 Batteries Installed'],
      ['windshield_done','🪟 Windshield Done'],['tires_changed','🚗 Tires Changed'],['electrical_issues','⚡ Electrical Issues noted'],

      ['supplies_ordered','📦 Supplies Ordered'],['aei_inspection','🔍 AEI Inspection done'],['copart_inspection','🏢 Copart Inspection done'],
      ['tracker_gs','📡 GS Gold Star tracker set'],['tracker_azuga','📡 Azuga tracker set'],['tracker_samsara','📡 Samsara tracker set'],
      ['title_issue','⚠ Title Issue flag'],['total_loss','💥 Total Loss flag'],['has_claim','📋 Has Claim flag'],
      ['needs_approval','⏳ Approval Needed flag'],['needs_mgr_review','👔 Manager Review flag']
    ];
    var chkChanges=[];
    checkboxFields.forEach(function(arr){
      if(data[arr[0]]&&!prevTruck[arr[0]])chkChanges.push(arr[1]);
      else if(!data[arr[0]]&&prevTruck[arr[0]])chkChanges.push(arr[1]+' (unchecked)');
    });
    if(chkChanges.length)autoNotes.push('[UPDATED] '+chkChanges.join(', '));
    // Track other field changes
    var fieldChanges=[];
    if(data.mileage&&data.mileage!==prevTruck.mileage)fieldChanges.push('Mileage: '+data.mileage);
    if(data.estimate_price&&data.estimate_price!==prevTruck.estimate_price)fieldChanges.push('Estimate: $'+data.estimate_price);
    if(data.yard&&data.yard!==prevTruck.yard)fieldChanges.push('Yard: '+data.yard);
    if(data.state&&data.state!==prevTruck.state)fieldChanges.push('State: '+data.state);
    if(data.leasing_company&&data.leasing_company!==prevTruck.leasing_company)fieldChanges.push('Leasing Co: '+data.leasing_company);
    if(data.vendor_short_name&&data.vendor_short_name!==prevTruck.vendor_short_name)fieldChanges.push('Vendor: '+data.vendor_short_name);
    if(data.body_condition&&data.body_condition!==prevTruck.body_condition)fieldChanges.push('Body Condition: '+data.body_condition);
    if(data.repo_agent&&data.repo_agent!==prevTruck.repo_agent)fieldChanges.push('Repo Agent: '+data.repo_agent);
    // Date fields
    if(data.terminated_date&&data.terminated_date!==prevTruck.terminated_date)fieldChanges.push('Terminated Date: '+data.terminated_date);
    if(data.recovery_date&&data.recovery_date!==prevTruck.recovery_date)fieldChanges.push('Recovery Date: '+data.recovery_date);
    if(data.est_completion_date&&data.est_completion_date!==prevTruck.est_completion_date)fieldChanges.push('Est. Completion: '+data.est_completion_date);
    if(data.intake_date&&data.intake_date!==prevTruck.intake_date)fieldChanges.push('Intake Date: '+data.intake_date);
    if(data.ready_date&&data.ready_date!==prevTruck.ready_date)fieldChanges.push('Ready Date: '+data.ready_date);
    if(data.assigned_date&&data.assigned_date!==prevTruck.assigned_date)fieldChanges.push('Assigned Date: '+data.assigned_date);
    if(data.pickup_date&&data.pickup_date!==prevTruck.pickup_date)fieldChanges.push('Pickup Date: '+data.pickup_date);
    if(fieldChanges.length)autoNotes.push('[FIELD UPDATE] '+fieldChanges.join(' | '));
    if(pendingNote)autoNotes.push(pendingNote);
    // Always record the save so truck appears in Recently Worked On
    if(!autoNotes.length)autoNotes.push('[SAVED] '+me.name+' reviewed this file');

    if(autoNotes.length){
      await db.from('notes').insert(autoNotes.map(function(c){return {truck_id:truckId,user_name:me.name,content:c};}));
      var nr=await db.from('notes').select('*').eq('truck_id',truckId).order('created_at',{ascending:false});
      notes=nr.data||[];
    }
    var i=trucks.findIndex(function(t){return t.id===truckId;});
    if(i>=0)trucks[i]=res.data;else trucks.unshift(res.data);
    updateBadges();
    // Update estimate price orig value so form stays in sync
    var ep2=document.getElementById('f-estprice');
    if(ep2&&res.data.estimate_price){
      ep2.setAttribute('data-orig-price',res.data.estimate_price);
      ep2.value=parseFloat(res.data.estimate_price).toFixed(2);
    }
    window._origTruck=JSON.parse(JSON.stringify(res.data));
    document.getElementById('d-vin').textContent=res.data.vin||'-';
    document.getElementById('d-ymm').textContent=res.data.year_make_model||'';
    document.getElementById('d-sbadge').textContent=res.data.stage||'';

    var nn=document.getElementById('nnote');if(nn&&nn.value.trim())nn.value='';
  renderNotes();toast('Saved!','ok');if(tab==='dashboard')loadRecentWorked();if(closeAfter)closeDetail();
  }else{console.error('Save error:',res.error);toast('Error: '+(res.error?res.error.message:'Save failed'),'err');}
}

async function moveStage(){
  var ns=document.getElementById('d-move').value;if(!ns||!truckId)return;
  var now=new Date().toISOString();
  var cur=await db.from('stage_history').select('*').eq('truck_id',truckId).is('exited_at',null).maybeSingle();
  if(cur.data){var hrs=(new Date(now)-new Date(cur.data.entered_at))/3600000;await db.from('stage_history').update({exited_at:now,duration_hours:hrs}).eq('id',cur.data.id);}
  await db.from('stage_history').insert({truck_id:truckId,stage:ns,user_name:me.name});
  var upd={stage:ns,updated_at:now,date_last_worked:now.split('T')[0]};
  if(AUTO_DATE_STAGES.includes(ns))upd.est_completion_date=addDays(2);
  if(ns==='Intake'){var cur2=trucks.find(function(t){return t.id===truckId;});if(cur2&&!cur2.intake_date)upd.intake_date=today();}
  if(ns==='Reassignment Closed')upd.pickup_date=today();
  var res=await db.from('trucks').update(upd).eq('id',truckId).select().single();
  if(res.data){
    var i=trucks.findIndex(function(t){return t.id===truckId;});if(i>=0)trucks[i]=res.data;
    document.getElementById('d-sbadge').textContent=ns;
    document.getElementById('d-sbadge').className='sbadge '+(SCSS[ns]||'s-intake');
    document.getElementById('f-stage').value=ns;
    document.getElementById('d-move').value='';
    await db.from('notes').insert({truck_id:truckId,user_name:me.name,content:'[STAGE CHANGE] Moved to: '+ns+(AUTO_DATE_STAGES.includes(ns)?' | Est. completion: '+addDays(2):'')});
    var nr=await db.from('notes').select('*').eq('truck_id',truckId).order('created_at',{ascending:false});
    notes=nr.data||[];renderNotes();
    var h=await db.from('stage_history').select('*').eq('truck_id',truckId).order('entered_at',{ascending:true});
    hist=h.data||[];renderHist();updateBadges();
    await openDetail(truckId);toast('Moved to '+ns,'ok');
  }
}

async function delTruck(){
  if(!isAdmin){toast('Admin access required','err');return;}
  if(!confirm('Delete this truck permanently?'))return;
  await db.from('trucks').delete().eq('id',truckId);
  await db.from('notes').delete().eq('truck_id',truckId);
  await db.from('expenses').delete().eq('truck_id',truckId);

function mkClaimRows(data){
  if(!data.length)return '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text2)">No claims</td></tr>';
  return data.map(function(c){
    var days=c.due_date?Math.round((new Date(c.due_date)-new Date())/86400000):null;
    var dh=days===null?'-':days<0?'<span style="color:#ef4444;font-weight:600">'+days+'d</span>':days===0?'<span style="color:#f59e0b;font-weight:600">Today</span>':'<span style="color:#22c55e">'+days+'d</span>';
    return '<tr onclick="openClaimDetail(\''+c.id+'\')" style="cursor:pointer">'+
      '<td>'+fmtDate(c.date_of_loss)+'</td>'+
      '<td><span class="sbadge s-intake" style="font-size:11px">'+(c.status||'')+'</span></td>'+
      '<td style="font-family:monospace">'+(c.vin||'-')+'</td>'+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">'+(c.claim_number||'-')+'</td>'+
      '<td>'+(c.insurance?c.insurance.substring(0,25):'-')+'</td>'+
      '<td>'+(c.tib?c.tib.substring(0,20):'-')+'</td>'+
      '<td style="color:'+(c.priority==='High'?'#ef4444':c.priority==='Medium'?'#f59e0b':'var(--text2)')+'">'+( c.priority||'-')+'</td>'+
      '<td>'+fmtDate(c.due_date)+'</td><td>'+dh+'</td></tr>';
  }).join('');
}

function filterC(){
  var q=(document.getElementById('csrch').value||'').toLowerCase();
  var st=document.getElementById('cstf').value||'';
  var pr=document.getElementById('cpri').value||'';
  var d=claims.slice();
  if(q)d=d.filter(function(c){return (c.vin||'').toLowerCase().includes(q)||(c.claim_number||'').toLowerCase().includes(q)||(c.tib||'').toLowerCase().includes(q)||(c.insurance||'').toLowerCase().includes(q);});
  if(st)d=d.filter(function(c){return c.status===st;});
  if(pr)d=d.filter(function(c){return c.priority===pr;});
  var b=document.getElementById('ctbody');if(b)b.innerHTML=mkClaimRows(d);
}

async function doSaveClaim(id){
  var data={
    date_of_loss:document.getElementById('cd-dol').value||null,
    status:document.getElementById('cd-st').value,
    vin:document.getElementById('cd-vin').value.trim(),
    claim_number:document.getElementById('cd-cn').value.trim(),
    insurance:document.getElementById('cd-ins').value.trim(),
    priority:document.getElementById('cd-pri').value,
    due_date:document.getElementById('cd-due').value||null,
    tib:document.getElementById('cd-tib').value.trim(),
    leasing_bank:document.getElementById('cd-lb').value.trim(),
    also_notify:document.getElementById('cd-an').value,
    waiting_on:document.getElementById('cd-wo').value,
    pay_deferred:document.getElementById('cd-pd').value,
    problem:document.getElementById('cd-prob').value.trim(),
    shah_notes:document.getElementById('cd-sn').value.trim(),
    chris_notes:document.getElementById('cd-cn2').value.trim(),
    updated_at:new Date().toISOString()
  };
  var res;
  if(id==='new'){res=await db.from('claims').insert(data).select().single();if(res.data)claims.unshift(res.data);}
  else{res=await db.from('claims').update(data).eq('id',id).select().single();if(res.data){var i=claims.findIndex(function(c){return c.id===id;});if(i>=0)claims[i]=res.data;}}
  if(res.data){document.getElementById('cmodal').remove();updateBadges();renderClaims(document.getElementById('main'));toast('Claim saved','ok');}
  else toast('Error saving claim','err');
}

async function doDelClaim(id){

  claims=claims.filter(function(c){return c.id!==id;});
  document.getElementById('cmodal').remove();
  updateBadges();renderClaims(document.getElementById('main'));toast('Deleted','ok');
}

async function runReport(){
  var fromDate=document.getElementById('rf').value,toDate=document.getElementById('rt').value;
  var stageFrom=document.getElementById('rsf').value,stageTo=document.getElementById('rst').value;
  var r=document.getElementById('rresults');
  r.innerHTML='<div style="display:flex;align-items:center;padding:20px 0;color:var(--text2)"><div class="spin"></div>Running...</div>';
  var res=await db.from('stage_history').select('*, trucks(vin,year_make_model,stage)').order('entered_at',{ascending:true});
  var data=res.data||[];
  if(!data.length){r.innerHTML='<div style="color:var(--text2);padding:20px 0">No data found</div>';return;}
  var byTruck={};
  data.forEach(function(h){
    if(!byTruck[h.truck_id])byTruck[h.truck_id]={vin:h.trucks?h.trucks.vin:'',ymm:h.trucks?h.trucks.year_make_model:'',currentStage:h.trucks?h.trucks.stage:'',stages:[]};
    byTruck[h.truck_id].stages.push(h);
  });
  var now=new Date();
  var rows=Object.values(byTruck).map(function(t){
    var stages=t.stages;if(!stages.length)return null;
    var first=stages[0],last=stages[stages.length-1];
    var totalHours=(new Date(last.exited_at||now)-new Date(first.entered_at))/3600000;
    var cur=stages.find(function(s){return !s.exited_at;});
    var curH=cur?(now-new Date(cur.entered_at))/3600000:0;
    return{vin:t.vin||'-',ymm:t.ymm||'-',currentStage:t.currentStage||last.stage,firstStage:first.stage,
      startDate:new Date(first.entered_at).toLocaleDateString(),
      endDate:last.exited_at?new Date(last.exited_at).toLocaleDateString():'Active',
      totalDays:(totalHours/24).toFixed(1),curDays:(curH/24).toFixed(1),stageCount:stages.length};
  }).filter(Boolean);
  if(fromDate)rows=rows.filter(function(row){return new Date(row.startDate)>=new Date(fromDate);});

}

async function promoteUser(email,name){
  if(!confirm('Make '+name+' an admin?'))return;
  var res=await db.from('users').update({role:'admin'}).eq('email',email);
  if(res.error){toast('Error: '+res.error.message,'err');return;}
  toast(name+' is now an admin ✅ — they need to sign out and back in','ok');
  loadUserList();
}

async function demoteUser(email,name){
  if(!confirm('Remove admin role from '+name+'?'))return;
  var res=await db.from('users').update({role:null}).eq('email',email);
  if(res.error){toast('Error: '+res.error.message,'err');return;}
  toast(name+' is now a regular user — they need to sign out and back in','ok');
  loadUserList();
}

function filterDashByYard(){
  var yard=document.getElementById('yard-dash-filter')?document.getElementById('yard-dash-filter').value:'';
  var countEl=document.getElementById('yard-filter-count');
  if(!yard){
    if(countEl)countEl.textContent='';
    // Reset stage rows to normal counts
    STAGES.forEach(function(s){
      var el=document.getElementById('bk-stage-'+s.replace(/ /g,'_'));
      if(el)el.textContent=trucks.filter(function(t){return t.stage===s&&!t.is_archived;}).length;
    });
    return;
  }
  var yardTrucks=trucks.filter(function(t){return t.yard===yard;});
  if(countEl)countEl.textContent=yardTrucks.length+' trucks in '+yard;
  // Update stage row counts for this yard
  STAGES.forEach(function(s){
    var el=document.getElementById('bk-stage-'+s.replace(/ /g,'_'));
    if(el)el.textContent=yardTrucks.filter(function(t){return t.stage===s;}).length;
  });
}

async function saveEstimateNote(){
  var modal=document.getElementById('est-note-modal');
  var price=modal?parseFloat(modal.getAttribute('data-price'))||0:0;
  var noteText=document.getElementById('est-note-text').value.trim();
  var confirmed=document.getElementById('est-onedrive-confirm').checked;
  var errEl=document.getElementById('est-note-err');

  if(!noteText){
    errEl.style.display='block';
    errEl.textContent='Please add a note describing this estimate.';
    return;
  }
  if(!confirmed){
    errEl.style.display='block';
    errEl.textContent='Please confirm you have saved the estimate to OneDrive.';
    return;
  }

  // Build the full note
  var d=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
  var priceStr=price.toFixed(2);
  var fullNote=d+' - ESTIMATE $'+priceStr+'\n'+noteText+'\n[Estimate document saved to OneDrive]';

  // Add note to the note textarea so it gets saved with the truck
  var noteTa=document.getElementById('nnote');
  if(noteTa){
    noteTa.value=fullNote;
  }

  // Update data-orig-price so prompt doesn't fire again
  var inp=document.getElementById('f-estprice');
  if(inp){inp.setAttribute('data-orig-price',price);}

  // Auto-check Approval Needed flag
  var approvalChk=document.getElementById('f-approval');
  if(approvalChk&&!approvalChk.checked){approvalChk.checked=true;}

  var m=document.getElementById('est-note-modal');if(m)m.remove();

  // Auto-save the truck immediately
  toast('Saving...','ok');
  await saveTruck(false);
}

async function findShop(){
  var t=trucks.find(function(x){return x.id===truckId;})||{};
  var yard=getFormVal('f-yard')||t.yard||'';
  var state=getFormVal('f-state')||t.state||'';

  // Build a flat list of all yards across all states for matching
  var allYards=[];
  Object.keys(YARDS_BY_STATE).forEach(function(stKey){
    YARDS_BY_STATE[stKey].forEach(function(y){allYards.push(y);});
  });

  // Try to match truck's yard name against known Copart yard names
  var matchedYard=null;
  if(yard){
    var yardUpper=yard.toUpperCase();
    // Exact match first
    matchedYard=allYards.find(function(y){return y.name.toUpperCase()===yardUpper;});
    // Partial match (e.g. "VALLEJO" in yard name)
    if(!matchedYard)matchedYard=allYards.find(function(y){return y.name.toUpperCase().includes(yardUpper)||yardUpper.includes(y.name.toUpperCase().replace(/^[A-Z]{2}\s*-\s*/,'').trim());});
  }

  // Determine which state's yards to show in the dropdown
  var dropdownStateKey='';
  if(matchedYard){
    dropdownStateKey=matchedYard.state||matchedYard.name.substring(0,2);
  } else if(state){
    dropdownStateKey=state.toUpperCase().substring(0,2);
  }
  var stYards=YARDS_BY_STATE[dropdownStateKey]||[];

  // If still no matched yard, use the first yard in the state
  if(!matchedYard&&stYards.length>0)matchedYard=stYards[0];

  var yardAddr=matchedYard?matchedYard.address:'';
  var yardName=matchedYard?matchedYard.name:'';

  // Show modal
  var old=document.getElementById('find-shop-modal');if(old)old.remove();
  var el=document.createElement('div');el.className='overlay-bg';el.id='find-shop-modal';
  el.innerHTML='<div class="overlay-box" style="max-width:800px">'+
    '<div class="ov-hdr">'+
    '<div><div style="font-size:15px;font-weight:600">🔧 Find Nearby Repair Shop</div>'+
    '<div style="font-size:12px;color:var(--text2);margin-top:2px">Truck: '+(t.vin||'')+(yardName?' | '+yardName:'')+(yardAddr?' | '+yardAddr.split(',').slice(-2).join(',').trim():'')+'</div></div>'+
    '<button class="btn btn-secondary btn-sm" data-action2="closeFindShop">✕</button>'+
    '</div>'+
    '<div class="ov-body">'+
    '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">'+
    '<div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px">'+
    (stYards.length>1?
    '<select id="shop-yard-sel" class="fsel2">'+
    stYards.map(function(y){return '<option value="'+y.address+'"'+(matchedYard&&y.name===matchedYard.name?' selected':'')+'>'+y.name+'</option>';}).join('')+
    '</select>':'')+ 
    '<input id="shop-addr" class="fi" placeholder="Enter address or city, state..." value="'+(yardAddr||'')+'" style="width:100%">'+
    '</div>'+
    '<select id="shop-type" class="fsel2" style="width:180px">'+
    '<option value="truck_repair">Truck Repair</option>'+
    '<option value="diesel">Diesel / Heavy Duty</option>'+
    '<option value="tires">Commercial Tires</option>'+
    '<option value="body">Body & Collision</option>'+
    '</select>'+
    '<button class="btn btn-primary" id="shop-search-btn">🔍 Search</button>'+
    '</div>'+
    '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:12px">'+
    '<div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px">🔗 Brand Dealer Locators (opens with your location)</div>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
    '<a href="https://www.internationaltrucks.com/dealers?zip='+encodeURIComponent(yardAddr||state||'')+'" target="_blank" class="btn btn-secondary btn-xs">International</a>'+
    '<a href="https://www.peterbilt.com/dealer-locator" target="_blank" class="btn btn-secondary btn-xs">Peterbilt</a>'+
    '<a href="https://www.kenworth.com/dealer-locations/" target="_blank" class="btn btn-secondary btn-xs">Kenworth</a>'+
    '<a href="https://www.freightliner.com/dealer-locator" target="_blank" class="btn btn-secondary btn-xs">Freightliner</a>'+
    '<a href="https://www.hino.com/find-a-dealer/" target="_blank" class="btn btn-secondary btn-xs">Hino</a>'+
    '<a href="https://www.rushtruckcenters.com/locations" target="_blank" class="btn btn-secondary btn-xs">Rush Truck Centers</a>'+
    '<a href="https://www.speedco.com/locations" target="_blank" class="btn btn-secondary btn-xs">Speedco</a>'+
    '<a href="https://www.loves.com/en/truck-care/locations" target="_blank" class="btn btn-secondary btn-xs">Loves Truck Care</a>'+
    '</div></div>'+
    '<div id="shop-results" style="min-height:60px;color:var(--text2);font-size:12px">'+
    '</div>'+
    '</div>'+
    '</div>';
  document.body.appendChild(el);
  document.getElementById('shop-search-btn').onclick=searchShops;
  var ysel=document.getElementById('shop-yard-sel');
  if(ysel)ysel.addEventListener('change',function(){
    var addr=document.getElementById('shop-addr');
    if(addr)addr.value=this.value;
  });
  // Auto-search if we have a matched yard address
  if(yardAddr){setTimeout(searchShops,500);}
}

function city_from_state(state){
  if(!state)return '';
  var yards=YARDS_BY_STATE[state.toUpperCase().substring(0,2)]||[];
  return yards.length?yards[0].address:'';
}

function calcDist(lat1,lon1,lat2,lon2){
  var dlat=(lat2-lat1)*Math.PI/180;
  var dlon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dlat/2)*Math.sin(dlat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dlon/2)*Math.sin(dlon/2);
  return 3958.8*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function geocodeAddr(addr){
  var res=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(addr),{
    headers:{'Accept-Language':'en','User-Agent':'FleetTracker/1.0'}
  });
  var data=await res.json();
  return data&&data.length?{lat:parseFloat(data[0].lat),lon:parseFloat(data[0].lon),display:data[0].display_name}:null;
}

async function searchShops(){
  var addr=document.getElementById('shop-addr').value.trim();
  var resultsEl=document.getElementById('shop-results');
  if(!addr){toast('Enter an address first','err');return;}
  resultsEl.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:20px;color:var(--text2)"><div class="spin"></div>Searching...</div>';

  try{
    // Step 1: Geocode
    var geo=await geocodeAddr(addr);
    if(!geo){
      resultsEl.innerHTML='<div style="padding:20px;text-align:center;color:#f87171">Could not find location. Try city, state format.</div>';
      return;
    }

    // Step 2: Find nearby leasing vendors (primary source - already vetted)
    var nearbyVendors=LEASING_VENDORS.map(function(v){
      return Object.assign({},v,{_source:'leasing'});
    }).filter(function(v){
      return v.state&&v.city;
    });

    // Geocode vendor locations using city+state match (fast, no API calls)
    // Filter to same state first
    var stateMatch=nearbyVendors.filter(function(v){
      return v.state.toUpperCase()===addr.toUpperCase().split(',').pop().trim().substring(0,2)||
             v.state.toUpperCase()===addr.toUpperCase().split(' ').pop().trim().substring(0,2)||
             addr.toUpperCase().includes(v.state.toUpperCase());
    });

    var radius=80467; // 50 miles

      'way["shop"="truck_repair"](around:'+radius+','+geo.lat+','+geo.lon+');'+
      'way["name"~"truck|peterbilt|kenworth|international|freightliner|volvo|mack|hino",i]["shop"="car_repair"](around:'+radius+','+geo.lat+','+geo.lon+');'+
      ');out body center 30;';

    var ovRes=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(overpassQuery)});
    var ovData=await ovRes.json();
    var osmShops=(ovData.elements||[]).filter(function(e){return e.tags&&e.tags.name;});
    osmShops.forEach(function(e){
      var elat=e.lat||(e.center&&e.center.lat);
      var elon=e.lon||(e.center&&e.center.lon);
      e._dist=elat&&elon?calcDist(geo.lat,geo.lon,elat,elon):999;
      e._lat=elat;e._lon=elon;
      e._source='osm';
    });
    osmShops.sort(function(a,b){return a._dist-b._dist;});

    // Check if any leasing vendor name matches OSM results
    var allResults=osmShops.slice(0,15).map(function(e){
      var tags=e.tags||{};
      var name=tags.name||'';
      var isLeasing=LEASING_VENDORS.some(function(v){
        return name.toUpperCase().includes(v.name.split(' ')[0].toUpperCase())||
               v.name.toUpperCase().includes(name.toUpperCase().split(' ')[0]);
      });
      var isKnownInSystem=trucks.some(function(t){
        return (t.vendor_short_name||'').toLowerCase().includes(name.toLowerCase().split(' ')[0]);
      });

        name:name,
        phone:tags.phone||tags['contact:phone']||'',
        website:tags.website||tags['contact:website']||'',
        addr:[tags['addr:housenumber'],tags['addr:street'],tags['addr:city'],tags['addr:state']].filter(Boolean).join(' '),

    allResults.forEach(function(v){

      '<div style="font-size:11px;color:var(--text2);margin-bottom:10px">📍 Near: '+geo.display.split(',').slice(0,3).join(',')+'</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px">'+
      merged.map(function(v,i){
        var dist=v.dist===null?'Same state':v.dist<1?(v.dist*5280).toFixed(0)+' ft':v.dist.toFixed(1)+' mi';
        var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(v.name+(v.addr?' '+v.addr:''));
        var border=v.isMaint?'#7c3aed':v.isLeasing?'#f59e0b':v.isKnown?'#22c55e':'var(--border)';
        return '<div style="background:var(--bg3);border:1px solid '+border+';border-radius:6px;padding:10px 14px">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
          (v.isMaint?'<span style="background:#2d1b69;color:#c4b5fd;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600">🔧 Currently Used</span>':'')+ 
          (v.isLeasing?'<span style="background:#3b2a00;color:#fcd34d;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600">⭐ Preferred Vendor</span>':'')+ 
          (v.isKnown?'<span style="background:#0f2a1a;color:#86efac;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600">✓ Known Vendor</span>':'')+
          '<span style="font-weight:600;font-size:13px">'+(i+1)+'. '+v.name+'</span>'+
          '</div>'+
          '<span style="color:var(--accent);font-weight:600;font-size:12px;white-space:nowrap;margin-left:8px">'+dist+'</span>'+
          '</div>'+
          (v.addr?'<div style="font-size:11px;color:var(--text2);margin-top:4px">📍 '+v.addr+'</div>':'')+
          '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">'+
          '<a href="'+mapsUrl+'" target="_blank" class="btn btn-secondary btn-xs">🗺 Open in Maps</a>'+
          (v.phone?'<a href="tel:'+v.phone+'" class="btn btn-secondary btn-xs">📞 '+v.phone+'</a>':'')+
          (v.website?'<a href="'+v.website+'" target="_blank" class="btn btn-secondary btn-xs">🌐 Website</a>':'')+
          '</div>'+
          '</div>';
      }).join('')+
      '</div>';
  }catch(err){
    resultsEl.innerHTML='<div style="padding:20px;text-align:center;color:#f87171">Error searching. <a href="https://www.google.com/maps/search/truck+repair+near+'+encodeURIComponent(addr)+'" target="_blank" style="color:var(--accent)">Try Google Maps →</a></div>';
    console.error(err);
  }
}

function toast(msg,type){
  var t=document.createElement('div');t.className='toast '+(type==='ok'?'tok-ok':'tok-err');
  t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3000);
}

var u=localStorage.getItem('ft_user');
if(u){me=JSON.parse(u);isAdmin=(me.email===ADMIN_EMAIL||(me&&me.role==='admin'));bootApp();}
</script>
</body>
</html>
